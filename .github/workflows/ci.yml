name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: python -m pytest tests/ -v --tb=short --cov=cloakpii --cov-report=term-missing

  # Security & packaging gates — run once (not per Python version).
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          python -m pip install --upgrade pip build twine pip-audit "bandit[toml]"
          pip install -e .
      - name: Static security scan (bandit)
        run: bandit -r src/ -ll -c pyproject.toml -q
      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit --strict || true   # advisory: don't block on upstream CVEs
      - name: Build & metadata check
        run: |
          python -m build
          python -m twine check dist/*
